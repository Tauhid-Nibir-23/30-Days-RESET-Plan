<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success - 30-Day Discipline Tracker</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/success.css">
</head>
<body>
    <section class="success-section">
        <div class="success-container">
            <div class="success-content animate-bounce-in">
                <div class="success-icon">🎉</div>
                <h1 class="success-title">Congratulations!</h1>
                <p class="success-subtitle" id="successUsername">Nibir</p>
                <p class="success-message">You completed the 30-day challenge!</p>
                
                <div class="success-stats">
                    <div class="success-stat">
                        <p class="success-stat-value">30</p>
                        <p class="success-stat-label">Days Completed</p>
                    </div>
                    <div class="success-stat">
                        <p class="success-stat-value">30</p>
                        <p class="success-stat-label">Day Streak</p>
                    </div>
                    <div class="success-stat">
                        <p class="success-stat-value">100%</p>
                        <p class="success-stat-label">Progress</p>
                    </div>
                </div>

                <p class="success-quote">"You don't have to be great to start, but you have to start to be great." — Zig Ziglar</p>

                <div class="success-actions">
                    <a href="login.html" class="btn btn-primary btn-lg">Start New Challenge</a>
                    <a href="index.html" class="btn btn-secondary btn-lg">Back Home</a>
                </div>
            </div>
            <div class="bg-glow"></div>
        </div>
    </section>

    <div id="confetti" class="confetti-container"></div>

    <script src="js/confetti.js"></script>
    <script src="js/success.js"></script>
</body>
</html>
