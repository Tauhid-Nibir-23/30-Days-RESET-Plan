<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>30-Day Discipline Tracker</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/landing.css">
</head>
<body>
    <section class="landing-section">
        <div class="landing-container">
            <div class="landing-content animate-fade-in">
                <div class="landing-flame">🔥</div>
                <h1 class="landing-title">30-Day Discipline Reset</h1>
                <p class="landing-subtitle">Become Better Than Yesterday</p>
                
                <div class="quote-container">
                    <p class="landing-quote">"The secret of getting ahead is getting started." — Mark Twain</p>
                </div>

                <a href="login.html" class="btn btn-primary btn-lg">
                    Start Your Journey <span class="arrow">→</span>
                </a>

                <div class="landing-stats">
                    <div class="stat">
                        <p class="stat-number">30</p>
                        <p class="stat-label">Days</p>
                    </div>
                    <div class="stat">
                        <p class="stat-number">9</p>
                        <p class="stat-label">Daily Habits</p>
                    </div>
                    <div class="stat">
                        <p class="stat-number">∞</p>
                        <p class="stat-label">Potential</p>
                    </div>
                </div>
            </div>
            <div class="bg-glow"></div>
        </div>
    </section>
</body>
</html>
